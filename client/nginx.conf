server {
    listen 80;
    server_name _;

    # Match server's express.json({ limit: '50mb' })
    client_max_body_size 50m;

    # Proxy API to backend container
    location /api/ {
        proxy_pass http://server:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # Proxy static uploads (audio/images) served by Express
    location /uploads/ {
        proxy_pass http://server:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback for the React app
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Light caching for hashed Vite assets
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
